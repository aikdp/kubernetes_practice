apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx-ReplicaSet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
      tier: backend
      env: dev
  template:
    metadata:
      labels:
        app: nginx
        tier: backed
        env: dev
    spec:
      containers:
      - name: ng
        image: nginx  #try to chnage version of image and apply. it won't create bew verisons
---
apiVersion: v1
kind: Service
metadata:
  name: sr-nginx
spec:
  selector:
    app: nginx
    tier: backed
    env: dev
  ports:
  - name: nginx-port
    protocol: TCP
    port: 80 #service port
    targetPort: 80  #container port(app port)