apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: expense
spec:
  replicas: 2
  selector:
    matchLabels:
      project: expense
      module: frontend
      env: dev
  template:
    metadata:
      labels:
        project: expense
        module: frontend
        env: dev
    spec:
      containers:
      - name: backend
        image: kdprasad028/frontend_july:v1  #try to chnage version of image and apply. it won't create bew verisons
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: expense
spec:
  type: LoadBalancer
  selector:
    project: expense
    module: frontend
    env: dev
  ports:
  - name: frontend-port
    protocol: TCP
    port: 80 #service port
    targetPort: 80  #container port(app port)